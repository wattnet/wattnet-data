# ENTSO-E Zone Structure:
#   - zone_id: Zone area display name as defined by ENTSO-E
#     full_name: Full descriptive name of the zone
#     eic_code: Energy Identification Code (EIC) of the zone
#     country_code: ISO 3166-1 alpha-2 country code which the zone belongs
#     country_name: Name of the country to which the zone belongs
#     provider: [entsoe | elexon | ...] - The data provider for this zone

- zone_id: "FR"
  full_name: "France"
  eic_code: "10YFR-RTE------C"
  country_code: "FR"
  country_name: "France"
  provider: "entsoe"

- zone_id: "GB"
  full_name: "Great Britain"
  eic_code: "10YGB----------A"
  country_code: "UK"
  country_name: "United Kingdom"
  provider: "elexon"

- zone_id: "NIE"
  full_name: "Northern Ireland"
  eic_code: "10Y1001A1001A016"
  country_code: "UK"
  country_name: "United Kingdom"
  provider: "entsoe"

- zone_id: "IE"
  full_name: "Ireland"
  eic_code: "10YIE-1001A00010"
  country_code: "IE"
  country_name: "Ireland"
  provider: "entsoe"
